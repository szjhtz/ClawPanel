# Release 工作流：在打 tag 或手动触发时构建前端、在 4 个指定系统上原生构建二进制、生成安装包并发布 Release。
name: Release Build

on:
  push:
    # 按发行形态分别使用独立 tag 前缀。
    tags:
      - 'pro-v*'
      - 'lite-v*'
  workflow_dispatch:
    # 支持手动触发，并可显式指定版本号与发行形态。
    inputs:
      edition:
        description: 'Edition (pro or lite)'
        required: true
        default: 'pro'
        type: choice
        options:
          - pro
          - lite
      version:
        description: 'Version without leading prefix (optional)'
        required: false
        type: string

permissions:
  contents: write

concurrency:
  # 发布流程不自动取消，避免并发发版时中途打断已开始的构建。
  group: release-${{ github.workflow }}-${{ github.ref_name || github.run_id }}
  cancel-in-progress: false

jobs:
  # 统一解析版本号，后续所有 job 直接复用这个输出。
  prepare:
    name: Prepare Version
    runs-on: ubuntu-24.04
    outputs:
      edition: ${{ steps.version.outputs.edition }}
      version: ${{ steps.version.outputs.version }}
      app_name: ${{ steps.version.outputs.app_name }}
      release_title: ${{ steps.version.outputs.release_title }}
      tag_name: ${{ steps.version.outputs.tag_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve version
        id: version
        env:
          INPUT_EDITION: ${{ github.event.inputs.edition }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail

          EDITION=""
          if [[ "${GITHUB_REF}" == refs/tags/pro-v* ]]; then
            EDITION="pro"
            VERSION="${GITHUB_REF_NAME#pro-v}"
          elif [[ "${GITHUB_REF}" == refs/tags/lite-v* ]]; then
            EDITION="lite"
            VERSION="${GITHUB_REF_NAME#lite-v}"
          elif [[ -n "${INPUT_EDITION:-}" ]]; then
            EDITION="${INPUT_EDITION}"
            VERSION="${INPUT_VERSION#v}"
          elif [[ -n "${INPUT_VERSION:-}" ]]; then
            EDITION="pro"
            VERSION="${INPUT_VERSION#v}"
          else
            EDITION="pro"
            VERSION="$(awk -F '[:= ]+' '/^VERSION[[:space:]]*:=[[:space:]]*/ { print $2; exit }' Makefile)"
          fi

          if [[ "${EDITION}" != "pro" && "${EDITION}" != "lite" ]]; then
            echo "Invalid edition: ${EDITION}" >&2
            exit 1
          fi

          if [[ -z "${VERSION}" ]]; then
            echo "Failed to resolve version" >&2
            exit 1
          fi

          APP_NAME="clawpanel"
          RELEASE_TITLE="ClawPanel Pro v${VERSION}"
          TAG_NAME="pro-v${VERSION}"
          if [[ "${EDITION}" == "lite" ]]; then
            APP_NAME="clawpanel-lite"
            RELEASE_TITLE="ClawPanel Lite v${VERSION}"
            TAG_NAME="lite-v${VERSION}"
          fi

          echo "Resolved edition=${EDITION} version=${VERSION}"
          echo "edition=${EDITION}" >> "${GITHUB_OUTPUT}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "app_name=${APP_NAME}" >> "${GITHUB_OUTPUT}"
          echo "release_title=${RELEASE_TITLE}" >> "${GITHUB_OUTPUT}"
          echo "tag_name=${TAG_NAME}" >> "${GITHUB_OUTPUT}"

  # 前端只构建一次，后续所有平台二进制都复用这份 dist artifact。
  build-frontend:
    name: Build Frontend
    needs: prepare
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Build web
        working-directory: web
        run: npm run build

      - name: Upload web dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: web/dist/
          retention-days: 3

  # 在稳定可用的 runner 上构建发布二进制。
  # 其中 darwin/amd64 改为在 Linux runner 上交叉编译，避免 macos-13 runner 不可用导致整条发布链路中断。
  build-binaries:
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    needs: [prepare, build-frontend]
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            os: linux
            arch: amd64
            ext: ''
          - runner: ubuntu-24.04-arm
            os: linux
            arch: arm64
            ext: ''
          - runner: ubuntu-24.04
            os: darwin
            arch: amd64
            ext: ''
          - runner: macos-15
            os: darwin
            arch: arm64
            ext: ''
          - runner: windows-2025
            os: windows
            arch: amd64
            ext: '.exe'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download web dist artifact
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: web/dist

      - name: Embed web dist (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          rm -rf cmd/clawpanel/frontend/dist
          mkdir -p cmd/clawpanel/frontend/dist
          cp -R web/dist/. cmd/clawpanel/frontend/dist/

      - name: Embed web dist (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force cmd/clawpanel/frontend/dist -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path cmd/clawpanel/frontend/dist | Out-Null
          Copy-Item -Path "web/dist/*" -Destination "cmd/clawpanel/frontend/dist" -Recurse -Force

      - name: Build binary
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
        run: go build -trimpath -ldflags "-s -w -X github.com/zhaoxinyi02/ClawPanel/internal/buildinfo.Version=${{ needs.prepare.outputs.version }} -X github.com/zhaoxinyi02/ClawPanel/internal/buildinfo.Edition=${{ needs.prepare.outputs.edition }}" -o "${{ needs.prepare.outputs.app_name }}-v${{ needs.prepare.outputs.version }}-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}" ./cmd/clawpanel/

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: binary-${{ matrix.os }}-${{ matrix.arch }}
          path: ${{ needs.prepare.outputs.app_name }}-v${{ needs.prepare.outputs.version }}-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}
          retention-days: 30

  build-lite-packages:
    name: Build Lite Core Packages
    if: needs.prepare.outputs.edition == 'lite'
    needs: [prepare, build-binaries]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: amd64
            runner: ubuntu-24.04
            artifact: binary-linux-amd64
            binary_name: clawpanel-lite-v${{ needs.prepare.outputs.version }}-linux-amd64
          - os: darwin
            arch: amd64
            runner: macos-15
            artifact: binary-darwin-amd64
            binary_name: clawpanel-lite-v${{ needs.prepare.outputs.version }}-darwin-amd64
          - os: darwin
            arch: arm64
            runner: macos-15
            artifact: binary-darwin-arm64
            binary_name: clawpanel-lite-v${{ needs.prepare.outputs.version }}-darwin-arm64
          - os: windows
            arch: amd64
            runner: windows-2025
            artifact: binary-windows-amd64
            binary_name: clawpanel-lite-v${{ needs.prepare.outputs.version }}-windows-amd64.exe

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Download Lite binary artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.artifact }}
          path: dist

      - name: Prepare Lite package inputs
        shell: bash
        run: |
          mkdir -p bin
          cp "dist/${{ matrix.binary_name }}" "bin/${{ matrix.binary_name }}"

      - name: Collect bundled plugins
        shell: bash
        env:
          TARGET_OS: ${{ matrix.os }}
        run: bash scripts/package-lite-plugins.sh

      - name: Build Lite core package
        shell: bash
        env:
          TARGET_OS: ${{ matrix.os }}
          TARGET_ARCH: ${{ matrix.arch }}
          VERSION: ${{ needs.prepare.outputs.version }}
          LITE_BINARY: ${{ github.workspace }}/dist/${{ matrix.binary_name }}
          OPENCLAW_SRC: ""
        run: bash scripts/package-lite-core.sh ${{ needs.prepare.outputs.version }}

      - name: Upload Lite package artifact
        uses: actions/upload-artifact@v7
        with:
          name: lite-package-${{ matrix.os }}-${{ matrix.arch }}
          path: release/lite/v${{ needs.prepare.outputs.version }}/*
          retention-days: 30

  # Windows 安装包复用前面生成好的 Windows 可执行文件，并在 Windows runner 上原生构建。
  build-installer:
    name: Build Windows Installer
    needs: [prepare, build-binaries]
    runs-on: windows-2025

    steps:
      - name: Checkout
        if: needs.prepare.outputs.edition == 'pro'
        uses: actions/checkout@v6

      - name: Setup Go
        if: needs.prepare.outputs.edition == 'pro'
        uses: actions/setup-go@v6
        with:
          go-version-file: installer/go.mod
          cache: true

      - name: Download windows binary artifact
        if: needs.prepare.outputs.edition == 'pro'
        uses: actions/download-artifact@v8
        with:
          name: binary-windows-amd64
          path: dist

      - name: Build installer
        if: needs.prepare.outputs.edition == 'pro'
        shell: pwsh
        working-directory: installer
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          New-Item -ItemType Directory -Force -Path payload | Out-Null
          New-Item -ItemType Directory -Force -Path ../dist | Out-Null
          Copy-Item "../dist/clawpanel-v${env:VERSION}-windows-amd64.exe" "payload/clawpanel.exe" -Force
          go build -trimpath -ldflags "-s -w -X main.VERSION=${env:VERSION}" -o "../dist/ClawPanel-Setup-v${env:VERSION}.exe" .
          Remove-Item "payload/clawpanel.exe" -Force

      - name: Upload installer artifact
        if: needs.prepare.outputs.edition == 'pro'
        uses: actions/upload-artifact@v7
        with:
          name: windows-installer
          path: dist/ClawPanel-Setup-v${{ needs.prepare.outputs.version }}.exe
          retention-days: 30

  # 汇总所有二进制/安装包，并生成统一 checksums。
  bundle:
    name: Bundle Release Assets
    needs: [prepare, build-binaries, build-installer, build-lite-packages]
    runs-on: ubuntu-24.04

    steps:
      - name: Download binary artifacts
        if: needs.prepare.outputs.edition != 'lite'
        uses: actions/download-artifact@v8
        with:
          pattern: binary-*
          path: release
          merge-multiple: true

      - name: Download Lite package artifacts
        if: needs.prepare.outputs.edition == 'lite'
        uses: actions/download-artifact@v8
        with:
          pattern: lite-package-*
          path: release
          merge-multiple: true

      - name: Download installer artifact
        if: needs.prepare.outputs.edition == 'pro'
        uses: actions/download-artifact@v8
        with:
          name: windows-installer
          path: release

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd release
          sha256sum * | sort > checksums.txt

      - name: Upload bundled artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-bundle-${{ needs.prepare.outputs.version }}
          path: release/*
          retention-days: 30

  # 只有真正的 tag 发布才会把资产上传到 GitHub Release 页面。
  publish-release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/pro-v') || startsWith(github.ref, 'refs/tags/lite-v')
    needs: [prepare, bundle]
    runs-on: ubuntu-24.04

    steps:
      - name: Download bundled artifacts
        uses: actions/download-artifact@v8
        with:
          name: release-bundle-${{ needs.prepare.outputs.version }}
          path: release

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag_name }}
          target_commitish: ${{ github.sha }}
          name: ${{ needs.prepare.outputs.release_title }}
          generate_release_notes: true
          files: |
            release/*
          fail_on_unmatched_files: true

  publish-gitee-release:
    name: Publish Gitee Release
    if: (startsWith(github.ref, 'refs/tags/pro-v') || startsWith(github.ref, 'refs/tags/lite-v')) && secrets.GITEE_TOKEN != ''
    needs: [prepare, bundle, publish-release]
    runs-on: ubuntu-24.04

    steps:
      - name: Download bundled artifacts
        uses: actions/download-artifact@v8
        with:
          name: release-bundle-${{ needs.prepare.outputs.version }}
          path: release

      - name: Sync release to Gitee
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_OWNER: zxy000006
          GITEE_REPO: ClawPanel
          TAG_NAME: ${{ needs.prepare.outputs.tag_name }}
          RELEASE_TITLE: ${{ needs.prepare.outputs.release_title }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import mimetypes
          import os
          import pathlib
          import subprocess
          import sys
          import urllib.parse
          import urllib.request

          token = os.environ['GITEE_TOKEN']
          owner = os.environ['GITEE_OWNER']
          repo = os.environ['GITEE_REPO']
          tag_name = os.environ['TAG_NAME']
          release_title = os.environ['RELEASE_TITLE']
          release_dir = pathlib.Path('release')

          def api_url(path: str) -> str:
              base = f'https://gitee.com/api/v5/repos/{owner}/{repo}{path}'
              sep = '&' if '?' in base else '?'
              return f'{base}{sep}access_token={token}'

          def request_json(url: str, method: str = 'GET', data=None):
              if data is not None and not isinstance(data, (bytes, bytearray)):
                  data = urllib.parse.urlencode(data).encode()
              req = urllib.request.Request(url, data=data, method=method)
              with urllib.request.urlopen(req) as resp:
                  body = resp.read().decode() or 'null'
                  return json.loads(body)

          releases = request_json(api_url('/releases'))
          existing = next((r for r in releases if r.get('tag_name') == tag_name), None)
          if existing:
              req = urllib.request.Request(api_url(f"/releases/{existing['id']}"), method='DELETE')
              urllib.request.urlopen(req).read()

          release = request_json(
              api_url('/releases'),
              method='POST',
              data={
                  'tag_name': tag_name,
                  'target_commitish': tag_name,
                  'name': release_title,
                  'body': f'Auto-synced from GitHub release {tag_name}',
                  'prerelease': 'false',
              },
          )
          release_id = release['id']

          for asset in sorted(release_dir.glob('*')):
              if not asset.is_file():
                  continue
              content_type = mimetypes.guess_type(str(asset))[0] or 'application/octet-stream'
              cmd = [
                  'curl', '-fsSL', '-X', 'POST',
                  '-F', f'name={asset.name}',
                  '-F', f'file=@{asset}',
                  api_url(f'/releases/{release_id}/attach_files'),
              ]
              env = os.environ.copy()
              env['CURL_CA_BUNDLE'] = env.get('CURL_CA_BUNDLE', '')
              subprocess.check_call(cmd, env=env)
          PY
